<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Fall</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101416;
      --panel: #182023;
      --panel-2: #202a2d;
      --line: #3b4b4d;
      --text: #f1f4ee;
      --muted: #a8b5ad;
      --cyan: #61bfd1;
      --lime: #8fc35d;
      --gold: #e0b34e;
      --red: #df6557;
      --ink: #0b0e10;
      --shadow: rgba(0, 0, 0, 0.34);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(97, 191, 209, 0.08), transparent 42%),
        radial-gradient(circle at 82% 8%, rgba(224, 179, 78, 0.12), transparent 25%),
        var(--bg);
      color: var(--text);
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    button,
    select {
      font: inherit;
    }

    .app {
      width: min(1600px, 100%);
      height: 100vh;
      height: 100dvh;
      margin: 0 auto;
      padding: clamp(8px, 1.6vh, 14px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(8px, 1.4vh, 12px);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3.5vw, 2.6rem);
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .phase {
      min-width: 92px;
      padding: 6px 10px;
      border: 1px solid rgba(97, 191, 209, 0.46);
      border-radius: 999px;
      background: rgba(97, 191, 209, 0.1);
      color: #b8edf4;
      font-size: 0.76rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    select {
      min-height: 42px;
      max-width: 188px;
      padding: 0 38px 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, #263135, #1b2427);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
    }

    .lane-count-select {
      max-width: 112px;
    }

    select option {
      background: #182023;
      color: #f1f4ee;
    }

    .icon-button,
    .answer-button,
    .start-button {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      box-shadow: 0 10px 28px var(--shadow);
      transition:
        transform 120ms ease,
        border-color 120ms ease,
        background 120ms ease;
    }

    .icon-button {
      width: 44px;
      height: 42px;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(180deg, #283438, #1a2225);
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-button:hover,
    .answer-button:hover,
    .start-button:hover {
      border-color: rgba(97, 191, 209, 0.82);
      transform: translateY(-1px);
    }

    .icon-button:active,
    .answer-button:active,
    .start-button:active {
      transform: translateY(1px);
    }

    .icon-button:disabled,
    .answer-button:disabled {
      cursor: not-allowed;
      opacity: 0.46;
      transform: none;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(250px, 320px);
      gap: 12px;
      align-items: stretch;
    }

    .game-shell {
      min-width: 0;
      min-height: 0;
      height: 100%;
      position: relative;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent),
        #12191b;
      box-shadow: 0 18px 58px var(--shadow);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      border-radius: 6px;
      background: #0b0e10;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.055);
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    body[data-lanes="1"] .answers {
      grid-template-columns: minmax(0, 1fr);
    }

    body[data-lanes="2"] .answers {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    body[data-lanes="3"] .answers {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .lane-panel {
      min-width: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(59, 75, 77, 0.88);
      border-radius: var(--radius);
      background: #151d20;
    }

    .lane-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .answer-button {
      width: 100%;
      min-width: 0;
      min-height: 50px;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      background: linear-gradient(180deg, #253135, #1c2528);
      text-align: left;
    }

    .answer-button .key {
      width: 30px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      background: rgba(97, 191, 209, 0.16);
      color: #b8edf4;
      font-size: 1rem;
      font-weight: 900;
    }

    .answer-button .word {
      min-width: 0;
      color: var(--text);
      font-size: clamp(1.02rem, 1.85vw, 1.22rem);
      font-weight: 900;
      line-height: 1.18;
      overflow-wrap: anywhere;
      word-break: normal;
    }

    body[data-lanes="1"] .answer-button {
      min-height: 64px;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 12px;
      padding: 10px 14px;
    }

    body[data-lanes="1"] .answer-button .key {
      width: 38px;
      height: 38px;
      font-size: 1.15rem;
    }

    body[data-lanes="1"] .answer-button .word {
      font-size: clamp(1.26rem, 2.5vw, 1.6rem);
      line-height: 1.15;
    }

    body[data-lanes="2"] .answer-button {
      min-height: 56px;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      padding: 9px 12px;
    }

    body[data-lanes="2"] .answer-button .key {
      width: 34px;
      height: 34px;
      font-size: 1.06rem;
    }

    body[data-lanes="2"] .answer-button .word {
      font-size: clamp(1.12rem, 2.1vw, 1.38rem);
      line-height: 1.16;
    }

    .answer-button.correct {
      border-color: rgba(143, 195, 93, 0.96);
      background: linear-gradient(180deg, rgba(143, 195, 93, 0.34), rgba(31, 76, 42, 0.86));
    }

    .answer-button.wrong {
      border-color: rgba(223, 101, 87, 0.98);
      background: linear-gradient(180deg, rgba(223, 101, 87, 0.32), rgba(82, 30, 28, 0.84));
    }

    .hud {
      min-height: 0;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.036), transparent),
        var(--panel);
      box-shadow: 0 18px 58px var(--shadow);
    }

    .timer-value {
      font-size: clamp(3rem, 8vw, 5.4rem);
      line-height: 0.9;
      font-weight: 950;
      color: #f0ce6c;
      font-variant-numeric: tabular-nums;
    }

    .label-row,
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .stat-row strong {
      color: var(--text);
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .meter {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #0d1113;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .meter-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--gold), var(--lime));
      transition: width 120ms linear;
    }

    .stats {
      display: grid;
      gap: 9px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(97, 191, 209, 0.44), transparent);
    }

    .feed {
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 9px;
      border: 1px solid rgba(59, 75, 77, 0.82);
      border-radius: var(--radius);
      background: #111719;
    }

    .feed p {
      margin: 0;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
      color: #d9e6df;
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .feed p:last-child {
      border-bottom: 0;
    }

    .overlay {
      position: absolute;
      inset: 10px;
      display: none;
      place-items: center;
      padding: 22px;
      border-radius: 6px;
      background: rgba(10, 13, 14, 0.84);
      text-align: center;
      backdrop-filter: blur(2px);
      z-index: 3;
    }

    .overlay.show {
      display: grid;
    }

    .overlay-panel {
      width: min(440px, 100%);
    }

    .overlay h2 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 5vw, 3.7rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .overlay p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    .review-list {
      max-height: min(34vh, 260px);
      margin: 0 0 16px;
      overflow: auto;
      display: grid;
      gap: 7px;
      text-align: left;
    }

    .review-list:empty {
      display: none;
    }

    .review-title {
      margin: 0 0 8px;
      color: #b8edf4;
      font-size: 0.86rem;
      font-weight: 950;
      text-align: center;
      text-transform: uppercase;
    }

    .review-item {
      display: grid;
      grid-template-columns: minmax(84px, 0.9fr) minmax(110px, 1fr);
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid rgba(97, 191, 209, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      font-size: clamp(0.92rem, 2.2vw, 1.04rem);
      font-weight: 900;
    }

    .review-item span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .start-button {
      min-width: 150px;
      min-height: 44px;
      padding: 10px 18px;
      border-color: rgba(143, 195, 93, 0.82);
      background: linear-gradient(180deg, #a9d36c, #668f39);
      color: #0d1113;
      font-weight: 950;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .topbar,
      .main {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .hud {
        display: grid;
        grid-template-columns: 1fr 1fr;
        max-height: 178px;
        overflow: hidden;
      }

      .timer-block,
      .feed {
        grid-column: 1 / -1;
      }

      .feed {
        max-height: 62px;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 6px;
        gap: 6px;
      }

      .topbar {
        gap: 6px;
      }

      .brand {
        align-items: center;
        flex-direction: row;
        justify-content: space-between;
      }

      h1 {
        font-size: 1.08rem;
        white-space: normal;
      }

      .phase {
        min-width: 64px;
        padding: 4px 7px;
        font-size: 0.64rem;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(74px, 84px) repeat(3, 38px);
        gap: 6px;
        width: 100%;
      }

      select {
        max-width: none;
        min-width: 0;
        min-height: 36px;
        flex: 1 1 auto;
        padding-left: 9px;
        font-size: 0.9rem;
      }

      .lane-count-select {
        padding: 0 24px 0 8px;
        font-size: 0.78rem;
      }

      .icon-button {
        width: 38px;
        height: 36px;
        flex: 0 0 38px;
      }

      .icon-button svg {
        width: 19px;
        height: 19px;
      }

      .main {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 6px;
      }

      .game-shell {
        order: 2;
        min-height: 0;
        height: 100%;
        padding: 6px;
        gap: 6px;
        grid-template-rows: minmax(180px, 1fr) auto;
      }

      canvas {
        min-height: 0;
      }

      .answers {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 4px;
      }

      .lane-panel {
        padding: 4px;
        gap: 4px;
      }

      .lane-title {
        font-size: 0.58rem;
      }

      .answer-button {
        min-height: 42px;
        grid-template-columns: 22px minmax(0, 1fr);
        gap: 4px;
        padding: 6px 4px;
      }

      .answer-button .key {
        width: 21px;
        height: 21px;
        font-size: 0.76rem;
      }

      .answer-button .word {
        font-size: clamp(0.72rem, 2.7vw, 0.92rem);
        line-height: 1.08;
      }

      body[data-lanes="1"] .answer-button {
        min-height: 54px;
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 8px;
        padding: 8px 10px;
      }

      body[data-lanes="1"] .answer-button .key {
        width: 28px;
        height: 28px;
        font-size: 0.96rem;
      }

      body[data-lanes="1"] .answer-button .word {
        font-size: clamp(1rem, 4vw, 1.25rem);
        line-height: 1.12;
      }

      body[data-lanes="2"] .answer-button {
        min-height: 46px;
        grid-template-columns: 25px minmax(0, 1fr);
        gap: 6px;
        padding: 6px 6px;
      }

      body[data-lanes="2"] .answer-button .key {
        width: 23px;
        height: 23px;
        font-size: 0.82rem;
      }

      body[data-lanes="2"] .answer-button .word {
        font-size: clamp(0.84rem, 3.2vw, 1.05rem);
        line-height: 1.1;
      }

      .hud {
        order: 1;
        display: grid;
        grid-template-columns: 86px minmax(0, 1fr) minmax(0, 1fr);
        align-items: center;
        max-height: none;
        gap: 6px;
        padding: 6px;
        overflow: hidden;
      }

      .timer-block {
        min-width: 0;
        grid-column: auto;
      }

      .label-row {
        font-size: 0.62rem;
        gap: 5px;
      }

      #difficultyLabel {
        display: none;
      }

      .timer-value {
        font-size: 2.05rem;
        line-height: 0.88;
      }

      .meter {
        height: 6px;
      }

      .stats {
        gap: 4px;
      }

      .stat-row {
        font-size: 0.62rem;
        gap: 5px;
      }

      .stat-row strong {
        font-size: 0.78rem;
      }

      .feed,
      .divider {
        display: none;
      }

      .overlay {
        inset: 6px;
        padding: 14px;
      }

      .overlay h2 {
        font-size: 2rem;
      }

      .overlay p {
        margin-bottom: 12px;
        font-size: 0.92rem;
      }

      .review-list {
        max-height: 32vh;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 0.98rem;
      }

      .phase {
        min-width: 58px;
      }

      .hud {
        grid-template-columns: 78px minmax(0, 1fr) minmax(0, 1fr);
      }

      .lane-title {
        display: none;
      }

      .answer-button {
        min-height: 40px;
        grid-template-columns: 20px minmax(0, 1fr);
      }

      .answer-button .key {
        width: 19px;
        height: 19px;
      }

      .answer-button .word {
        font-size: clamp(0.68rem, 2.8vw, 0.84rem);
      }

      body[data-lanes="1"] .answer-button .word {
        font-size: clamp(0.96rem, 4.1vw, 1.16rem);
      }

      body[data-lanes="2"] .answer-button .word {
        font-size: clamp(0.78rem, 3.2vw, 0.98rem);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Word Fall</h1>
        <div class="phase" id="phaseLabel">Ready</div>
      </div>
      <div class="toolbar">
        <select id="difficultySelect" aria-label="難易度">
          <option value="junior1">中学1年</option>
          <option value="junior2">中学2年</option>
          <option value="junior3">中学3年</option>
          <option value="high1">高校1年</option>
          <option value="high2">高校2年</option>
          <option value="high3">高校3年</option>
          <option value="college">大学レベル</option>
          <option value="business">ビジネス英語</option>
        </select>
        <select class="lane-count-select" id="laneCountSelect" aria-label="レーン数">
          <option value="1">1レーン</option>
          <option value="2">2レーン</option>
          <option value="3" selected>3レーン</option>
        </select>
        <button class="icon-button" id="soundButton" type="button" title="サウンド ON" aria-label="サウンド ON">
          <svg class="sound-on-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
            <path d="M16 9.5a4 4 0 0 1 0 5"></path>
            <path d="M18.5 7a7 7 0 0 1 0 10"></path>
          </svg>
          <svg class="sound-off-icon hidden" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
            <path d="M19 9l-6 6"></path>
            <path d="M13 9l6 6"></path>
          </svg>
        </button>
        <button class="icon-button" id="pauseButton" type="button" title="一時停止" aria-label="一時停止" disabled>
          <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14"></path>
            <path d="M16 5v14"></path>
          </svg>
          <svg class="play-icon hidden" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5l11 7-11 7z"></path>
          </svg>
        </button>
        <button class="icon-button" id="restartButton" type="button" title="リセット" aria-label="リセット">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 12a8 8 0 1 1-2.34-5.66"></path>
            <path d="M20 4v6h-6"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="main">
      <div class="game-shell">
        <canvas id="gameCanvas" width="900" height="620"></canvas>
        <div class="answers" id="answers"></div>
        <div class="overlay show" id="overlay">
          <div class="overlay-panel">
            <h2 id="overlayTitle">Word Fall</h2>
            <p id="overlayCopy">レーン数を選んで、1分間で高得点を目指す英単語ゲーム。</p>
            <div class="review-list" id="reviewList"></div>
            <button class="start-button" id="startButton" type="button">Start</button>
          </div>
        </div>
      </div>

      <aside class="hud">
        <section class="timer-block">
          <div class="label-row">
            <span>Time</span>
            <span id="difficultyLabel">中学1年</span>
          </div>
          <div class="timer-value" id="timeValue">60</div>
          <div class="meter" aria-hidden="true">
            <div class="meter-fill" id="timeBar"></div>
          </div>
        </section>

        <section class="stats">
          <div class="stat-row"><span>Score</span><strong id="scoreValue">0</strong></div>
          <div class="stat-row"><span>Best</span><strong id="bestValue">0</strong></div>
          <div class="stat-row"><span>Streak</span><strong id="streakValue">0</strong></div>
        </section>

        <div class="divider" aria-hidden="true"></div>

        <section class="stats">
          <div class="stat-row"><span>Correct</span><strong id="correctValue">0</strong></div>
          <div class="stat-row"><span>Wrong</span><strong id="wrongValue">0</strong></div>
          <div class="stat-row"><span>Miss</span><strong id="missValue">0</strong></div>
          <div class="stat-row"><span>Accuracy</span><strong id="accuracyValue">0%</strong></div>
        </section>

        <section class="feed" id="feed" aria-label="ログ"></section>
      </aside>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      function parseWordTable(table) {
        return table.trim().split(/\n+/).map((line) => {

          return [parts[0], parts.slice(1).join("|")];
        }).filter(([english, japanese]) => english && japanese);

      function applySupplementalWords() {

          if (!level) {
            continue;
          }
          const seen = new Set(level.words.map(([english]) => english.toLowerCase()));
          for (const entry of parseWordTable(table)) {
            const key = entry[0].toLowerCase();
            if (level.words.length >= TARGET_WORDS_PER_LEVEL) {
              break;
            }
            if (!seen.has(key)) {
              level.words.push(entry);
              seen.add(key);
            }
          }
        }
      }

        state.rngSeed = (Math.imul(state.rngSeed, 1664525) + 1013904223) >>> 0;
        return state.rngSeed / 4294967296;
      }

      function randInt(min, max) {
        return Math.floor(nextRandom() * (max - min + 1)) + min;
      }

      function shuffle(list) {
        const copy = list.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = randInt(0, i);
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;

      function initAudio() {
        if (!audio.supported) {
          return false;
        }
        if (!audio.ctx) {
          const AudioContextClass = globalThis.AudioContext || globalThis.webkitAudioContext;
          audio.ctx = new AudioContextClass();
          audio.master = audio.ctx.createGain();
          audio.musicGain = audio.ctx.createGain();
          audio.master.gain.value = 0.52;
          audio.musicGain.gain.value = 0.72;
          audio.musicGain.connect(audio.master);
          audio.master.connect(audio.ctx.destination);

          const resume = audio.ctx.resume();
          if (resume && typeof resume.then === "function") {
            resume.then(() => {
              if (state.audioEnabled && state.phase === "playing") {
                audio.nextNoteTime = audio.ctx.currentTime + 0.05;
                scheduleBgmStep();
              }
            }).catch(() => {
              // Some browsers reject resume when the tab is backgrounded.
            });
          }
        }
        return true;

      function noteToFrequency(note) {
        return 440 * Math.pow(2, (note - 69) / 12);
      }

      function playTone(frequency, start, duration, type, gainValue, destination = audio.master) {
        if (!audio.ctx || !state.audioEnabled || !destination) {
          return;
        }
        const osc = audio.ctx.createOscillator();
        const gain = audio.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(destination);
        osc.start(start);
        osc.stop(start + duration + 0.03);
      }

      function playNoise(start, duration, gainValue) {
        if (!audio.ctx || !state.audioEnabled) {
          return;
        }
        const sampleRate = audio.ctx.sampleRate;
        const buffer = audio.ctx.createBuffer(1, Math.max(1, Math.floor(sampleRate * duration)), sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
        }
        const source = audio.ctx.createBufferSource();
        const filter = audio.ctx.createBiquadFilter();
        const gain = audio.ctx.createGain();
        filter.type = "highpass";
        filter.frequency.value = 900;
        gain.gain.setValueAtTime(gainValue, start);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        source.buffer = buffer;
        source.connect(filter);
        filter.connect(gain);
        gain.connect(audio.master);
        source.start(start);
      }

      function scheduleBgmStep() {
        if (!audio.ctx || !state.audioEnabled || state.phase !== "playing") {
          return;
        }
        const melody = [72, 76, 79, 83, 79, 76, 74, 79];
        const bass = [48, 55, 52, 57];
        const now = audio.ctx.currentTime;
        if (!audio.nextNoteTime || audio.nextNoteTime < now) {
          audio.nextNoteTime = now + 0.04;
        }
        while (audio.nextNoteTime < now + 0.28) {
          const step = audio.step;
          const note = melody[step % melody.length];
          playTone(noteToFrequency(note), audio.nextNoteTime, 0.14, "triangle", 0.082, audio.musicGain);
          if (step % 2 === 0) {
            playTone(noteToFrequency(bass[Math.floor(step / 2) % bass.length]), audio.nextNoteTime, 0.18, "sine", 0.055, audio.musicGain);
          }
          audio.nextNoteTime += 0.19;
          audio.step += 1;
        }
      }

      function startBgm() {
        if (!state.audioEnabled || !initAudio()) {
          return;
        }
        stopBgm();
        audio.step = 0;
        audio.nextNoteTime = audio.ctx.currentTime + 0.04;
        scheduleBgmStep();
        audio.bgmTimer = setInterval(scheduleBgmStep, 120);
      }

      function stopBgm() {
        if (audio.bgmTimer) {
          clearInterval(audio.bgmTimer);
          audio.bgmTimer = 0;
        }
      }

      function playSfx(kind) {
        if (!state.audioEnabled || !initAudio()) {
          return;

        const now = audio.ctx.currentTime;
        if (kind === "start") {
          playTone(523.25, now, 0.08, "triangle", 0.08);
          playTone(659.25, now + 0.08, 0.09, "triangle", 0.075);
          playTone(783.99, now + 0.16, 0.12, "triangle", 0.07);
        } else if (kind === "correct") {
          playTone(659.25, now, 0.07, "triangle", 0.085);
          playTone(880, now + 0.065, 0.1, "triangle", 0.08);
        } else if (kind === "wrong") {
          playTone(220, now, 0.12, "sawtooth", 0.055);
          playTone(164.81, now + 0.07, 0.16, "sawtooth", 0.045);
        } else if (kind === "miss") {
          playNoise(now, 0.16, 0.055);
          playTone(196, now + 0.04, 0.16, "square", 0.032);
        } else if (kind === "finish") {

          playTone(659.25, now + 0.09, 0.1, "triangle", 0.075);
          playTone(523.25, now + 0.18, 0.2, "triangle", 0.07);
        } else if (kind === "toggle") {
          playTone(740, now, 0.08, "triangle", 0.055);
        }
      }

        const oldSize = canvas.width && canvas.height ? canvasSize() : null;
        const box = canvas.getBoundingClientRect();
        const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        canvas.width = Math.max(480, Math.floor(box.width * ratio));
        canvas.height = Math.max(360, Math.floor(box.height * ratio));
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        const newSize = canvasSize();
        if (oldSize && state.phase === "playing") {
          preserveFallProgress(oldSize, newSize);
        }
      }

      function canvasSize() {
        const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        return {
          width: canvas.width / ratio,
          height: canvas.height / ratio
        };
      }

      function missLineY(size = canvasSize()) {
        return Math.max(180, size.height - MISS_LINE_OFFSET);
      }

      function fallDistance(size = canvasSize()) {
        return Math.max(240, missLineY(size) + 96);
      }

      function fallHeightScale(size = canvasSize()) {
        return Math.max(0.65, Math.min(2.25, fallDistance(size) / FALL_REFERENCE_DISTANCE));
      }

      function preserveFallProgress(oldSize, newSize) {
        const oldMiss = missLineY(oldSize);
        const newMiss = missLineY(newSize);
        for (const lane of state.lanes) {
          if (!lane || lane.locked) {
            continue;
          }
          const startY = lane.startY ?? lane.y;
          const oldRange = Math.max(1, oldMiss - startY);
          const progress = Math.max(0, Math.min(1.25, (lane.y - startY) / oldRange));
          lane.y = startY + (newMiss - startY) * progress;
        }
      }

      function chooseWord() {
        const words = activeLevel().words;
        let candidate = words[randInt(0, words.length - 1)];
        for (let i = 0; i < 24 && state.recent.includes(candidate[0]); i += 1) {
          candidate = words[randInt(0, words.length - 1)];
        }
        state.recent.push(candidate[0]);
        state.recent = state.recent.slice(-9);
        return { english: candidate[0], japanese: candidate[1] };
      }

      function makeOptions(correct) {
        const pool = activeLevel().words
          .filter((entry) => entry[1] !== correct)
          .map((entry) => entry[1]);
        const choices = [correct];
        while (choices.length < 3 && pool.length) {
          const pick = pool.splice(randInt(0, pool.length - 1), 1)[0];
          if (!choices.includes(pick)) {
            choices.push(pick);
          }
        }
        return shuffle(choices);
      }

        state.lanes[index] = {

          word,
          options,

          startY,
          shake: 0,
          flash: "",
          flashTime: 0,
          locked: false
        };
      }

      function makeLanes() {
        state.lanes = [];
        for (let i = 0; i < activeLaneCount(); i += 1) {
          spawnLane(i, true);
          state.lanes[i].y -= i * 58;
        }
      }

      function addFeed(text) {
        state.feedback.unshift(text);
        state.feedback = state.feedback.slice(0, 8);
        renderFeed();
      }

      function renderFeed() {
        ui.feed.innerHTML = "";
        const lines = state.feedback.length ? state.feedback : ["Ready"];
        for (const text of lines) {
          const p = document.createElement("p");
          p.textContent = text;
          ui.feed.appendChild(p);
        }
      }

      function addReview(word, picked, reason) {
        const existing = state.review.get(word.english);
        if (existing) {
          existing.count += 1;
          existing.reason = reason;
          existing.lastPicked = picked;
          return;
        }
        state.review.set(word.english, {
          english: word.english,
          japanese: word.japanese,
          lastPicked: picked,
          reason,
          count: 1
        });
      }

      function showAnswerReveal(laneIndex, lane) {
        const size = canvasSize();
        state.effects.push({
          type: "reveal",
          lane: laneIndex,
          japanese: lane.word.japanese,
          text: lane.word.japanese,
          y: Math.max(92, Math.min(size.height - 124, lane.y + 32)),
          life: ANSWER_REVEAL_TIME,
          maxLife: ANSWER_REVEAL_TIME,
          color: "#f0ce6c"
        });
      }

      function renderReviewList() {
        ui.reviewList.innerHTML = "";
        if (!state.review.size) {
          const empty = document.createElement("div");
          empty.className = "review-title";
          empty.textContent = "復習なし";
          ui.reviewList.appendChild(empty);
          return;
        }

        const title = document.createElement("div");
        title.className = "review-title";
        title.textContent = "復習リスト";
        ui.reviewList.appendChild(title);

        for (const item of state.review.values()) {
          const row = document.createElement("div");
          row.className = "review-item";
          const english = document.createElement("span");
          english.textContent = item.count > 1 ? `${item.english} x${item.count}` : item.english;
          const japanese = document.createElement("span");
          japanese.textContent = item.japanese;
          row.append(english, japanese);
          ui.reviewList.appendChild(row);
        }
      }

      function modeLabel() {
        return `${activeLevel().label} / ${activeLaneCount()}レーン`;
      }

      function renderAnswerButtons() {
        ui.answers.innerHTML = "";
        ui.answers.style.setProperty("--lane-count", String(activeLaneCount()));
        for (let laneIndex = 0; laneIndex < activeLaneCount(); laneIndex += 1) {
          const lane = state.lanes[laneIndex];
          const panel = document.createElement("section");
          panel.className = "lane-panel";
          panel.setAttribute("aria-label", `Lane ${laneIndex + 1}`);

          const title = document.createElement("div");
          title.className = "lane-title";
          const left = document.createElement("span");
          left.textContent = `Lane ${laneIndex + 1}`;
          const right = document.createElement("span");
          right.textContent = laneKeys[laneIndex].join(" ");
          title.append(left, right);
          panel.appendChild(title);

          for (let optionIndex = 0; optionIndex < 3; optionIndex += 1) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "answer-button";
            button.dataset.lane = String(laneIndex);
            button.dataset.option = String(optionIndex);
            button.disabled = state.phase !== "playing" || Boolean(lane?.locked);
            if (lane && lane.flashTime > 0) {
              const isCorrect = lane.options[optionIndex] === lane.word.japanese;
              if (lane.flash === "correct" && isCorrect) {
                button.classList.add("correct");
              } else if (lane.flash === "wrong" && isCorrect) {
                button.classList.add("correct");
              } else if (lane.flash === "wrong" && !isCorrect) {
                button.classList.add("wrong");
              }
            }

            const key = document.createElement("span");
            key.className = "key";
            key.textContent = laneKeys[laneIndex][optionIndex];
            const word = document.createElement("span");
            word.className = "word";
            word.textContent = lane ? lane.options[optionIndex] : "";
            button.append(key, word);
            button.addEventListener("click", () => answer(laneIndex, optionIndex));
            panel.appendChild(button);
          }
          ui.answers.appendChild(panel);
        }
      }

      function startGame() {
        initAudio();
        const seedBase = Date.now() ^ Math.floor(Math.random() * 0xffffffff);
        state.rngSeed = seedBase >>> 0;
        state.phase = "playing";
        state.difficulty = ui.difficulty.value;
        state.laneCount = Number(ui.laneCount.value) || DEFAULT_LANES;
        state.score = 0;
        state.best = readBest();
        state.streak = 0;
        state.correct = 0;
        state.wrong = 0;
        state.miss = 0;
        state.timeLeft = RUN_TIME;
        state.elapsed = 0;
        state.feedback = [];
        state.review = new Map();
        state.effects = [];
        state.recent = [];
        state.lastTime = performance.now();
        makeLanes();
        hideOverlay();
        addFeed(`${modeLabel()} / Start`);
        playSfx("start");
        startBgm();
        updateUi();
        renderAnswerButtons();
      }

      function finishGame() {
        if (state.phase === "over") {
          return;
        }
        state.phase = "over";
        stopBgm();
        saveBest();
        showOverlay("Time Up", `Score ${state.score} / Best ${state.best}`, "Again");
        renderReviewList();
        addFeed(`Finish: ${state.score}`);
        playSfx("finish");
        updateUi();
        renderAnswerButtons();
      }

      function resetGame() {
        stopBgm();
        state.phase = "ready";
        state.difficulty = ui.difficulty.value;
        state.laneCount = Number(ui.laneCount.value) || DEFAULT_LANES;
        state.score = 0;
        state.best = readBest();
        state.streak = 0;
        state.correct = 0;
        state.wrong = 0;
        state.miss = 0;
        state.timeLeft = RUN_TIME;
        state.elapsed = 0;
        state.feedback = [];
        state.review = new Map();
        state.effects = [];
        state.recent = [];
        state.lastTime = performance.now();
        makeLanes();
        renderFeed();
        showOverlay("Word Fall", modeLabel(), "Start");
        updateUi();
        renderAnswerButtons();
      }

      function pauseGame() {
        if (state.phase === "playing") {
          state.phase = "paused";
          stopBgm();
          showOverlay("Paused", `Score ${state.score}`, "Resume");
        } else if (state.phase === "paused") {
          state.phase = "playing";
          state.lastTime = performance.now();
          hideOverlay();
          startBgm();
        }
        updateUi();
        renderAnswerButtons();
      }

      function speedNow() {
        const level = activeLevel();
        const ramp = level.baseSpeed + state.elapsed * level.accel + Math.min(42, state.correct * 0.42);
        return ramp * fallHeightScale() * FALL_SPEED_MULTIPLIER;
      }

      function answer(laneIndex, optionIndex) {
        if (state.phase !== "playing") {
          return;
        }
        const lane = state.lanes[laneIndex];
        if (!lane || lane.locked) {
          return;
        }

        const picked = lane.options[optionIndex];
        if (picked === lane.word.japanese) {
          lane.locked = true;
          lane.flash = "correct";
          lane.flashTime = 0.18;
          state.correct += 1;
          state.streak += 1;
          const size = canvasSize();
          const bottomBonus = Math.max(0, Math.round((1 - lane.y / (size.height - 92)) * 40));
          const gain = 100 + activeLevel().bonus + bottomBonus + Math.min(90, state.streak * 3);
          state.score += gain;
          playSfx("correct");
          state.effects.push({ lane: laneIndex, text: `+${gain}`, y: lane.y, life: 0.7, color: "#8fc35d" });
          addFeed(`${lane.word.english} = ${lane.word.japanese}`);
          setTimeout(renderAnswerButtons, 180);
          setTimeout(() => {
            if (state.phase === "playing") {
              spawnLane(laneIndex, true);
              renderAnswerButtons();
            }
          }, 120);
        } else {
          lane.locked = true;
          state.wrong += 1;
          state.streak = 0;
          state.score = Math.max(0, state.score - 20);
          lane.shake = 8;
          lane.flash = "wrong";
          lane.flashTime = 0.22;
          addReview(lane.word, picked, "wrong");
          showAnswerReveal(laneIndex, lane);
          playSfx("wrong");
          state.effects.push({ lane: laneIndex, text: "-20", y: lane.y, life: 0.55, color: "#df6557" });
          addFeed(`${lane.word.english}: 正解は ${lane.word.japanese}`);
          setTimeout(() => {
            if (state.phase === "playing") {
              spawnLane(laneIndex, true);
              renderAnswerButtons();
            }
          }, 180);
        }
        updateUi();
        renderAnswerButtons();
      }

      function missLane(laneIndex) {
        const lane = state.lanes[laneIndex];
        if (!lane || lane.locked) {
          return;
        }
        lane.locked = true;
        lane.flash = "wrong";
        lane.flashTime = 0.22;
        state.miss += 1;
        state.streak = 0;
        state.score = Math.max(0, state.score - 35);
        addReview(lane.word, null, "miss");
        showAnswerReveal(laneIndex, lane);
        playSfx("miss");
        state.effects.push({ lane: laneIndex, text: "MISS", y: missLineY(canvasSize()) + 8, life: 0.65, color: "#e0b34e" });
        addFeed(`${lane.word.english} = ${lane.word.japanese}`);
        setTimeout(() => {
          if (state.phase === "playing" && state.lanes[laneIndex] === lane) {
            spawnLane(laneIndex, true);
            renderAnswerButtons();
          }
        }, ANSWER_REVEAL_TIME * 1000);
        updateUi();
        renderAnswerButtons();
      }

      function updateGame(dt) {
        if (state.phase !== "playing") {
          return;
        }
        state.elapsed += dt;
        state.timeLeft -= dt;
        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          finishGame();
          return;
        }

        const size = canvasSize();
        const speed = speedNow();
        for (let i = 0; i < state.lanes.length; i += 1) {
          const lane = state.lanes[i];
          lane.shake = Math.max(0, lane.shake - 38 * dt);
          lane.flashTime = Math.max(0, lane.flashTime - dt);
          if (lane.locked) {
            continue;
          }
          lane.y += speed * dt;
          if (lane.y > missLineY(size)) {
            missLane(i);
          }
        }

        for (const effect of state.effects) {
          effect.life -= dt;
          effect.y -= 26 * dt;
        }
        state.effects = state.effects.filter((effect) => effect.life > 0);
      }

      function drawBoard() {
        const size = canvasSize();
        ctx.clearRect(0, 0, size.width, size.height);
        ctx.fillStyle = "#0b0e10";
        ctx.fillRect(0, 0, size.width, size.height);

        const lanes = activeLaneCount();
        const laneWidth = size.width / lanes;
        for (let i = 0; i < lanes; i += 1) {
          const x = i * laneWidth;
          ctx.fillStyle = i % 2 === 0 ? "#101719" : "#131c1f";
          ctx.fillRect(x, 0, laneWidth, size.height);

          ctx.strokeStyle = "rgba(97, 191, 209, 0.22)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, size.height);
          ctx.stroke();

          ctx.fillStyle = "rgba(224, 179, 78, 0.16)";
          ctx.fillRect(x + 12, missLineY(size) + 20, laneWidth - 24, 2);

          ctx.fillStyle = "rgba(241, 244, 238, 0.16)";
          ctx.font = "800 12px system-ui, sans-serif";
          ctx.textAlign = "left";
          ctx.fillText(`LANE ${i + 1}`, x + 16, 24);
        }

        ctx.strokeStyle = "rgba(97, 191, 209, 0.28)";
        ctx.beginPath();
        ctx.moveTo(size.width - 1, 0);
        ctx.lineTo(size.width - 1, size.height);
        ctx.stroke();

        drawWords(size, laneWidth);
        drawEffects(size, laneWidth);
      }

      function setCanvasFont(size) {
        ctx.font = `950 ${size}px system-ui, sans-serif`;
      }

      function measuredWidth(text) {
        return ctx.measureText(text).width;
      }

      function truncateCanvasText(text, maxWidth) {
        const marker = "...";
        if (measuredWidth(text) <= maxWidth) {
          return text;
        }
        let trimmed = "";
        for (const char of Array.from(text)) {
          const next = trimmed + char;
          if (measuredWidth(next + marker) > maxWidth) {
            break;
          }
          trimmed = next;
        }
        return trimmed ? trimmed + marker : marker;
      }

      function wrapContinuousText(text, maxWidth, maxLines) {
        const lines = [];
        let current = "";
        for (const char of Array.from(text)) {
          const candidate = current + char;
          if (current && measuredWidth(candidate) > maxWidth) {
            lines.push(current.trim());
            current = char.trimStart();
            if (lines.length >= maxLines) {
              return null;
            }
          } else {
            current = candidate;
          }
        }
        if (current.trim()) {
          lines.push(current.trim());
        }
        return lines.length <= maxLines ? lines : null;
      }

      function wrapCanvasText(text, maxWidth, maxLines) {
        const clean = String(text).trim().replace(/\s+/g, " ");
        if (!clean) {
          return [""];
        }

        const words = clean.split(" ");
        if (words.length === 1) {
          return wrapContinuousText(clean, maxWidth, maxLines);
        }

        const lines = [];
        let current = "";
        for (const word of words) {
          const candidate = current ? `${current} ${word}` : word;
          if (measuredWidth(candidate) <= maxWidth) {
            current = candidate;
            continue;
          }

          if (current) {
            lines.push(current);
            current = "";
            if (lines.length >= maxLines) {
              return null;
            }
          }

          if (measuredWidth(word) <= maxWidth) {
            current = word;
            continue;
          }

          const chunks = wrapContinuousText(word, maxWidth, maxLines - lines.length);
          if (!chunks) {
            return null;
          }
          for (let i = 0; i < chunks.length - 1; i += 1) {
            lines.push(chunks[i]);
            if (lines.length >= maxLines) {
              return null;
            }
          }
          current = chunks[chunks.length - 1] || "";
        }

        if (current) {
          lines.push(current);
        }
        return lines.length <= maxLines ? lines : null;
      }

      function layoutCanvasText(text, maxWidth, maxHeight, baseSize, maxLines, minSize = 11) {
        const roundedBase = Math.round(baseSize);
        for (let size = roundedBase; size >= minSize; size -= 1) {
          setCanvasFont(size);
          const lineHeight = Math.max(12, Math.round(size * 1.06));
          const lines = wrapCanvasText(text, maxWidth, maxLines);
          if (!lines) {
            continue;
          }
          const totalHeight = lineHeight * lines.length;
          const fitsWidth = lines.every((line) => measuredWidth(line) <= maxWidth + 0.5);
          if (fitsWidth && totalHeight <= maxHeight) {
            return { size, lineHeight, lines };
          }
        }

        setCanvasFont(minSize);
        const fallback = wrapCanvasText(text, maxWidth, maxLines)
          || wrapContinuousText(String(text).trim().replace(/\s+/g, " "), maxWidth, maxLines)
          || [String(text)];
        return {
          size: minSize,
          lineHeight: Math.max(12, Math.round(minSize * 1.06)),
          lines: fallback.slice(0, maxLines).map((line) => truncateCanvasText(line, maxWidth))
        };
      }

      function roundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + width - r, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + r);
        ctx.lineTo(x + width, y + height - r);
        ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        ctx.lineTo(x + r, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function drawWords(size, laneWidth) {
        for (const lane of state.lanes) {
          if (!lane) {
            continue;
          }
          const laneX = lane.index * laneWidth;
          const lanes = activeLaneCount();
          const cardGap = laneWidth < 130 ? 8 : laneWidth < 180 ? 14 : 24;
          const maxCardWidth = lanes === 1 ? 420 : lanes === 2 ? 340 : 282;
          const cardWidth = Math.max(58, Math.min(laneWidth - cardGap, maxCardWidth));
          const cardHeight = lanes === 1 ? 88 : lanes === 2 ? 78 : laneWidth < 130 ? 76 : 70;
          const x = laneX + (laneWidth - cardWidth) / 2 + (lane.shake ? Math.sin(performance.now() / 28) * lane.shake : 0);
          const y = lane.y;
          const pulse = lane.flash === "correct" && lane.flashTime > 0 ? 1 : 0;
          const glow = pulse ? "rgba(143, 195, 93, 0.52)" : "rgba(97, 191, 209, 0.22)";

          ctx.save();
          ctx.shadowColor = glow;
          ctx.shadowBlur = 18;
          roundRect(x, y, cardWidth, cardHeight, 8);
          ctx.fillStyle = "#eef6f1";
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = pulse ? "#8fc35d" : "#61bfd1";
          ctx.lineWidth = 2;
          ctx.stroke();

          const textMaxWidth = cardWidth - (laneWidth < 130 ? 12 : 24);
          const maxLines = cardWidth < 118 ? 3 : 2;
          const maxFont = lanes === 1 ? 46 : lanes === 2 ? 40 : 35;
          const minBaseFont = lanes === 1 ? 30 : lanes === 2 ? 27 : 24;
          const baseFont = Math.max(minBaseFont, Math.min(maxFont, cardWidth * 0.34));
          const textLayout = layoutCanvasText(lane.word.english, textMaxWidth, cardHeight - 18, baseFont, maxLines, 12);
          ctx.fillStyle = "#101416";
          setCanvasFont(textLayout.size);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          const textTop = y + cardHeight / 2 - (textLayout.lineHeight * textLayout.lines.length) / 2;
          for (let i = 0; i < textLayout.lines.length; i += 1) {
            ctx.fillText(textLayout.lines[i], x + cardWidth / 2, textTop + textLayout.lineHeight * (i + 0.5) + 1);
          }
          ctx.restore();
        }
      }

      function drawEffects(size, laneWidth) {
        for (const effect of state.effects) {
          const alpha = Math.max(0, Math.min(1, effect.life / (effect.maxLife || 0.7)));
          const laneCenter = effect.lane * laneWidth + laneWidth / 2;
          ctx.save();
          ctx.globalAlpha = alpha;
          if (effect.type === "reveal") {
            const progress = 1 - alpha;
            const scale = 0.88 + Math.sin(Math.min(1, progress * 1.2) * Math.PI) * 0.38;
            const lanes = activeLaneCount();
            const cardWidth = Math.min(laneWidth - 14, lanes === 1 ? 460 : lanes === 2 ? 390 : 340) * scale;
            const cardHeight = (lanes === 1 ? 112 : lanes === 2 ? 100 : 92) * scale;
            const x = laneCenter - cardWidth / 2;
            const y = effect.y - cardHeight / 2;

            ctx.shadowColor = "rgba(240, 206, 108, 0.58)";
            ctx.shadowBlur = 22;
            roundRect(x, y, cardWidth, cardHeight, 8);
            ctx.fillStyle = "rgba(18, 25, 27, 0.95)";
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = effect.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = "#f0ce6c";
            const maxLines = cardWidth < 150 ? 3 : 2;
            const textLayout = layoutCanvasText(effect.text, cardWidth - 20, cardHeight - 18, Math.round(44 * scale), maxLines, 12);
            setCanvasFont(textLayout.size);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const textTop = effect.y - (textLayout.lineHeight * textLayout.lines.length) / 2;
            for (let i = 0; i < textLayout.lines.length; i += 1) {
              ctx.fillText(textLayout.lines[i], laneCenter, textTop + textLayout.lineHeight * (i + 0.5) + 1);
            }
          } else {
            ctx.fillStyle = effect.color;
            ctx.font = "950 22px system-ui, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(effect.text, laneCenter, effect.y);
          }
          ctx.restore();
        }
      }

      function showOverlay(title, copy, buttonText) {
        ui.overlayTitle.textContent = title;
        ui.overlayCopy.textContent = copy;
        ui.reviewList.innerHTML = "";
        ui.startButton.textContent = buttonText;
        ui.overlay.classList.add("show");
      }

      function hideOverlay() {
        ui.overlay.classList.remove("show");
      }

      function accuracy() {
        const total = state.correct + state.wrong + state.miss;
        return total ? Math.round((state.correct / total) * 100) : 0;
      }

      function updateUi() {
        const level = activeLevel();
        document.body.dataset.lanes = String(activeLaneCount());
        ui.answers.style.setProperty("--lane-count", String(activeLaneCount()));
        ui.phase.textContent = state.phase === "playing"
          ? "Running"
          : state.phase === "paused"
            ? "Paused"
            : state.phase === "over"
              ? "Done"
              : "Ready";
        ui.difficultyLabel.textContent = `${level.label} / ${activeLaneCount()}L`;
        ui.laneCount.value = String(activeLaneCount());
        ui.time.textContent = String(Math.ceil(Math.max(0, state.timeLeft))).padStart(2, "0");
        ui.timeBar.style.width = `${Math.max(0, Math.min(100, (state.timeLeft / RUN_TIME) * 100))}%`;
        ui.score.textContent = String(state.score);
        ui.best.textContent = String(Math.max(state.best, state.score));
        ui.streak.textContent = String(state.streak);
        ui.correct.textContent = String(state.correct);
        ui.wrong.textContent = String(state.wrong);
        ui.miss.textContent = String(state.miss);
        ui.accuracy.textContent = `${accuracy()}%`;

        const canPause = state.phase === "playing" || state.phase === "paused";
        ui.pauseButton.disabled = !canPause;
        ui.pauseButton.title = state.phase === "paused" ? "再開" : "一時停止";
        ui.pauseButton.setAttribute("aria-label", ui.pauseButton.title);
        ui.pauseIcon.classList.toggle("hidden", state.phase === "paused");
        ui.playIcon.classList.toggle("hidden", state.phase !== "paused");
        ui.soundButton.title = state.audioEnabled ? "サウンド ON" : "サウンド OFF";
        ui.soundButton.setAttribute("aria-label", ui.soundButton.title);
        ui.soundOnIcon.classList.toggle("hidden", !state.audioEnabled);
        ui.soundOffIcon.classList.toggle("hidden", state.audioEnabled);
        ui.difficulty.disabled = state.phase === "playing" || state.phase === "paused";
        ui.laneCount.disabled = state.phase === "playing" || state.phase === "paused";
      }

      function gameLoop(now) {
        const dt = Math.min(0.08, (now - state.lastTime) / 1000 || 0);
        state.lastTime = now;
        updateGame(dt);
        drawBoard();
        updateUi();
        requestAnimationFrame(gameLoop);
      }

      function keyToLane(key) {
        for (let lane = 0; lane < activeLaneCount(); lane += 1) {
          const option = laneKeys[lane].indexOf(key);
          if (option >= 0) {
            return { lane, option };
          }
        }
        return null;
      }

      function attachEvents() {
        ui.startButton.addEventListener("click", () => {
          if (state.phase === "paused") {
            pauseGame();
          } else {
            startGame();
          }
        });
        ui.restartButton.addEventListener("click", resetGame);
        ui.soundButton.addEventListener("click", toggleAudio);
        ui.pauseButton.addEventListener("click", pauseGame);
        ui.difficulty.addEventListener("change", () => {
          if (state.phase === "ready" || state.phase === "over") {
            state.difficulty = ui.difficulty.value;
            state.best = readBest();
            state.effects = [];
            makeLanes();
            updateUi();
            renderAnswerButtons();
            drawBoard();
            showOverlay("Word Fall", modeLabel(), "Start");
          }
        });
        ui.laneCount.addEventListener("change", () => {
          if (state.phase === "ready" || state.phase === "over") {
            state.laneCount = Number(ui.laneCount.value) || DEFAULT_LANES;
            state.best = readBest();
            state.effects = [];
            makeLanes();
            updateUi();
            renderAnswerButtons();
            drawBoard();
            showOverlay("Word Fall", modeLabel(), "Start");
          }
        });
        window.addEventListener("resize", () => {
          resizeCanvas();
          drawBoard();
        });
        window.addEventListener("keydown", (event) => {
          const key = event.key.toLowerCase();
          const mapped = keyToLane(key);
          if (mapped) {
            event.preventDefault();
            answer(mapped.lane, mapped.option);
            return;
          }
          if ((key === "enter" || key === " ") && (state.phase === "ready" || state.phase === "over")) {
            event.preventDefault();
            startGame();
            return;
          }
          if (key === "p" || key === "escape") {
            event.preventDefault();
            pauseGame();
          }
        });
      }

      function init() {
        state.difficulty = ui.difficulty.value;
        state.laneCount = Number(ui.laneCount.value) || DEFAULT_LANES;
        state.best = readBest();
        state.lastTime = performance.now();
        makeLanes();
        resizeCanvas();
        renderFeed();
        renderAnswerButtons();
        updateUi();
        drawBoard();
        attachEvents();
        requestAnimationFrame(gameLoop);
      }

      init();
    })();
  </script>
</body>
</html>
